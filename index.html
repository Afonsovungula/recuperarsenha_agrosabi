<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste - Redefinir Senha</title>
</head>
<body>
    <h1>Teste de Redefinição de Senha</h1>
    <p>Token: <span id="tokenDisplay"></span></p>
    <p>ID: <span id="idDisplay"></span></p>
    
    <div>
        <input type="password" id="novaSenha" placeholder="Nova senha" />
        <input type="password" id="confirmarSenha" placeholder="Confirmar senha" />
        <button id="btnSubmit">Redefinir Senha</button>
    </div>

    <div id="msg" style="margin-top: 20px; padding: 10px; display: none;"></div>

    <script>
        // Configuração
        const BACKEND_URL = 'https://vigilant-computing-machine-7vv9g5pwgw463r44j-8080.app.github.dev/';
        
        // Funções
        function getQueryParam(param) {
            const params = new URLSearchParams(window.location.search);
            return params.get(param);
        }

        // Mostrar token e ID na página
        const token = getQueryParam('token');
        const id_usuario = getQueryParam('id_usuario');
        
        document.getElementById('tokenDisplay').textContent = token || 'NÃO ENCONTRADO';
        document.getElementById('idDisplay').textContent = id_usuario || 'NÃO ENCONTRADO';
        
        console.log("=== DEBUG ===");
        console.log("Token:", token);
        console.log("ID:", id_usuario);
        console.log("BACKEND_URL:", BACKEND_URL);
        
        // Função de redefinição
        async function redefinirSenha() {
            console.log("🔵 Botão clicado! Função executando...");
            
            const novaSenha = document.getElementById('novaSenha').value;
            const confirmarSenha = document.getElementById('confirmarSenha').value;
            const msgDiv = document.getElementById('msg');
            
            msgDiv.style.display = 'block';
            msgDiv.style.background = '#f0f0f0';
            msgDiv.innerHTML = 'Processando...';
            
            if (!novaSenha || novaSenha.length < 8) {
                msgDiv.innerHTML = '❌ A senha deve ter pelo menos 8 caracteres.';
                msgDiv.style.background = '#ffcccc';
                return;
            }
            
            if (novaSenha !== confirmarSenha) {
                msgDiv.innerHTML = '❌ As senhas não coincidem.';
                msgDiv.style.background = '#ffcccc';
                return;
            }
            
            if (!token || !id_usuario) {
                msgDiv.innerHTML = '❌ Link inválido ou expirado.';
                msgDiv.style.background = '#ffcccc';
                return;
            }
            
            try {
                console.log("📡 Enviando requisição para:", `${BACKEND_URL}/redefinir_senha`);
                
                const resposta = await fetch(`${BACKEND_URL}/redefinir_senha`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, novaSenha, id_usuario })
                });
                
                console.log("Status da resposta:", resposta.status);
                const dados = await resposta.json();
                console.log("Dados da resposta:", dados);
                
                if (resposta.ok) {
                    msgDiv.innerHTML = '✅ Senha alterada com sucesso!';
                    msgDiv.style.background = '#ccffcc';
                } else {
                    msgDiv.innerHTML = `❌ Erro: ${dados.error || 'Tente novamente'}`;
                    msgDiv.style.background = '#ffcccc';
                }
            } catch (erro) {
                console.error("Erro detalhado:", erro);
                msgDiv.innerHTML = '❌ Erro de conexão. Verifique sua internet.';
                msgDiv.style.background = '#ffcccc';
            }
        }
        
        // Conectar o botão
        const botao = document.getElementById('btnSubmit');
        botao.onclick = redefinirSenha;
        
        console.log("✅ Script carregado! Botão configurado.");
        alert("Página carregada! Verifique o console (F12) para mais detalhes.");
    </script>
</body>
</html>
