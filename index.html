<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgroSabi — Redefinir Senha</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
  
</head>
<body>

  <div class="leaf leaf-1">🌿</div>
  <div class="leaf leaf-2">🍃</div>
  <div class="leaf leaf-3">🌱</div>

  <div class="card">
    <div class="card-accent"></div>

    <div class="logo-area">
      <div class="logo-icon">🌾</div>
      <div class="logo-text">Agro<span>Sabi</span></div>
    </div>

    <h1>Redefinir Senha</h1>
    <p class="subtitle">Escolhe uma nova palavra-passe para a tua conta AgroSabi.</p>

    <div class="msg error" id="msgErro">
      <span>⚠️</span>
      <span id="textoErro">Ocorreu um erro.</span>
    </div>

    <div class="msg success" id="msgSucesso">
      <span>✅</span>
      <span>Senha alterada com sucesso! Podes voltar ao app e fazer login.</span>
    </div>

    <div id="formulario">
      <div class="field">
        <label for="novaSenha">Nova Senha</label>
        <input type="password" id="novaSenha" placeholder="Mínimo 8 caracteres" />
      </div>

      <div class="field">
        <label for="confirmarSenha">Confirmar Nova Senha</label>
        <input type="password" id="confirmarSenha" placeholder="Repete a nova senha" />
      </div>

      <button id="btnSubmit" onclick="redefinirSenha()">
        Actualizar Senha
      </button>
    </div>

    <div class="footer">AgroSabi © 2026 · Agricultura inteligente para Angola</div>
  </div>

  <script>

    
  const BACKEND_URL = 'https://vigilant-computing-machine-7vv9g5pwgw463r44j-8080.app.github.dev/';

    function getToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get('token');
    }
function getID_usuario(){
  const params = new URLSearchParams(window.location.search);
      return params.get('id_usuario');
}

  async function redefinirSenha() {
  const novaSenha = document.getElementById('novaSenha').value;
  const confirmarSenha = document.getElementById('confirmarSenha').value;
  const btn = document.getElementById('btnSubmit');

  // Reset visual
  document.getElementById('novaSenha').classList.remove('error');
  document.getElementById('confirmarSenha').classList.remove('error');
  document.getElementById('msgErro').style.display = 'none';

  // Validações
  if (!novaSenha || novaSenha.length < 8) {
    mostrarErro('A senha deve ter pelo menos 8 caracteres.');
    document.getElementById('novaSenha').classList.add('error');
    return;
  }

  if (novaSenha !== confirmarSenha) {
    mostrarErro('As senhas não coincidem.');
    document.getElementById('confirmarSenha').classList.add('error');
    return;
  }

  const token = getToken();
  const id_usuario = getID_usuario();

  if (!token || !id_usuario) {
    mostrarErro('Link inválido ou expirado. Solicita um novo link no app.');
    return;
  }

  // Loading
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> A actualizar...';

  try {
    const resposta = await fetch(`${BACKEND_URL}/redefinir_senha`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, novaSenha, id_usuario }),
    });

    const dados = await resposta.json();

    if (!resposta.ok) {
      mostrarErro(dados.error || 'Erro ao redefinir senha. Tenta novamente.');
      btn.disabled = false;
      btn.innerHTML = 'Actualizar Senha';
      return;
    }

    // Sucesso
    document.getElementById('formulario').style.display = 'none';
    document.getElementById('msgSucesso').style.display = 'flex';

  } catch (err) {
    mostrarErro('Erro de ligação. Verifica a tua internet e tenta novamente.');
    btn.disabled = false;
    btn.innerHTML = 'Actualizar Senha';
  }
}
  </script>
</body>
</html>
